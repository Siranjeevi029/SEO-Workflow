<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SEO Content Workflow</title>
<style>
  :root { --bg:#0e1116; --card:#161b22; --fg:#e6edf3; --mut:#8b949e; --acc:#3fb950; --acc2:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:20px 24px; border-bottom:1px solid #21262d; display:flex; align-items:center; gap:12px; }
  h1 { font-size:18px; margin:0; }
  .tag { font-size:12px; color:var(--mut); padding:2px 8px; border:1px solid #30363d; border-radius:999px; }
  main { max-width:960px; margin:0 auto; padding:24px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  label { display:block; font-size:12px; color:var(--mut); margin:10px 0 4px; }
  input, select { width:100%; padding:9px 11px; background:var(--card); border:1px solid #30363d; border-radius:8px; color:var(--fg); }
  button { margin-top:16px; padding:10px 18px; background:var(--acc); color:#04260c; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:wait; }
  .card { background:var(--card); border:1px solid #21262d; border-radius:12px; padding:16px; margin-top:16px; }
  .score { font-size:34px; font-weight:700; color:var(--acc); }
  pre { white-space:pre-wrap; word-break:break-word; font:13px/1.5 ui-monospace,monospace; color:#c9d1d9; }
  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .k { color:var(--acc2); }
  small { color:var(--mut); }
</style>
</head>
<body>
<header>
  <h1>🟢 SEO Content Workflow</h1><span class="tag">multi-agent pipeline</span>
  <span class="tag" id="stack">loading…</span>
</header>
<main>
  <div class="card">
    <div class="grid">
      <div><label>Topic</label><input id="topic" value="best budget mechanical keyboards" /></div>
      <div><label>Target keyword</label><input id="kw" value="budget mechanical keyboards" /></div>
      <div><label>Audience</label><input id="aud" value="tech enthusiasts on a budget" /></div>
      <div><label>Tone</label>
        <select id="tone"><option>professional</option><option>friendly</option><option>authoritative</option></select>
      </div>
    </div>
    <button id="go" onclick="run()">Generate ▶</button>
    <small id="status"></small>
  </div>

  <div id="out" style="display:none">
    <div class="card row">
      <div><div class="score" id="score">–</div><small>SEO score</small></div>
      <div><div id="title" class="k" style="font-size:16px"></div><small id="meta"></small></div>
    </div>
    <div class="card"><b>Brief</b><pre id="brief"></pre></div>
    <div class="card"><b>Article</b><pre id="article"></pre></div>
    <div class="card"><b>SEO checks</b><pre id="seo"></pre></div>
    <div class="card"><b>Trace</b> <small id="runid"></small><pre id="trace"></pre></div>
  </div>
</main>
<script>
async function boot() {
  try { const h = await (await fetch('/health')).json();
    document.getElementById('stack').textContent = `${h.mode} · ${h.llm} · ${h.search}`;
  } catch(e){}
}
async function run() {
  const btn = document.getElementById('go'); btn.disabled = true;
  document.getElementById('status').textContent = ' running 8 agents…';
  const body = { topic: topic.value, target_keyword: kw.value, audience: aud.value, tone: tone.value };
  try {
    const r = await (await fetch('/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})).json();
    document.getElementById('out').style.display = 'block';
    score.textContent = (r.seo && r.seo.score != null) ? r.seo.score : '–';
    title.textContent = (r.meta && r.meta.title_tag) || '';
    meta.textContent = (r.meta && r.meta.meta_description) || '';
    brief.textContent = JSON.stringify(r.brief, null, 2);
    article.textContent = r.article || '';
    seo.textContent = JSON.stringify(r.seo, null, 2);
    runid.textContent = r.run_id || '';
    const t = await (await fetch('/trace/' + r.run_id)).json();
    trace.textContent = t.events.map(e => `${e.seq}. [${e.agent}] ${e.action} ${e.status}${e.duration_ms?(' '+e.duration_ms+'ms'):''}`).join('\n');
  } catch(e) { document.getElementById('status').textContent = ' error: ' + e; }
  btn.disabled = false; document.getElementById('status').textContent = ' done';
}
boot();
</script>
</body>
</html>
